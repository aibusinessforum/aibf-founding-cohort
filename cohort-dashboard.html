<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIBF · Founding Cohort Applications</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1e293b; font-size: 14px; }

  /* Header */
  .header { background: #0f172a; color: #f8fafc; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .meta { font-size: 12px; color: #94a3b8; }
  .refresh-btn { font-size: 12px; padding: 6px 14px; background: transparent; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; cursor: pointer; }
  .refresh-btn:hover { border-color: #64748b; color: #f8fafc; }

  /* Layout */
  .page { padding: 22px 28px; max-width: 1400px; }

  /* Stat cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 16px; }
  .stat-num { font-size: 26px; font-weight: 700; color: #0f172a; line-height: 1; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #64748b; margin-top: 5px; }

  /* Charts */
  .charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 14px; }
  .chart-wrap { height: 180px; position: relative; }

  /* Table */
  .table-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .table-header input { font-size: 13px; padding: 7px 12px; border: 1px solid #e2e8f0; border-radius: 6px; width: 220px; outline: none; }
  .table-header input:focus { border-color: #3b82f6; }
  .sheet-link { font-size: 12px; color: #3b82f6; text-decoration: none; }
  .sheet-link:hover { text-decoration: underline; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #1e293b; }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .name-cell { font-weight: 600; color: #0f172a; font-size: 13px; }
  .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .msg { font-size: 12px; color: #64748b; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Stage badges */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-new          { background: #e0f2fe; color: #0369a1; }
  .badge-reviewed     { background: #fef9c3; color: #854d0e; }
  .badge-invited      { background: #e0e7ff; color: #4338ca; }
  .badge-call_booked  { background: #fce7f3; color: #9d174d; }
  .badge-call_done    { background: #d1fae5; color: #065f46; }
  .badge-joined_slack { background: #dcfce7; color: #14532d; }
  .badge-rejected     { background: #fee2e2; color: #991b1b; }

  /* States */
  .loading-state { text-align: center; padding: 70px; color: #64748b; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-row td { text-align: center; color: #94a3b8; padding: 30px; }
  .error-state { text-align: center; padding: 50px; color: #ef4444; font-size: 13px; }

  @media (max-width: 900px) {
    .charts { grid-template-columns: 1fr 1fr; }
    .stats { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 600px) {
    .charts { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .page { padding: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AIBF · Founding Cohort Applications</h1>
  <div class="header-right">
    <span class="meta" id="meta">Loading…</span>
    <button class="refresh-btn" onclick="init()">Refresh</button>
  </div>
</div>

<div class="page">

  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    Fetching applications…
  </div>

  <div id="main" style="display:none">
    <div class="stats" id="stats"></div>

    <div class="charts">
      <div class="card">
        <div class="card-title">Pipeline</div>
        <div class="chart-wrap"><canvas id="pipelineChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">By Industry</div>
        <div class="chart-wrap"><canvas id="industryChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Company Size</div>
        <div class="chart-wrap"><canvas id="sizeChart"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="card-title" style="margin-bottom:0">All Applicants</div>
        <div style="display:flex;align-items:center;gap:16px">
          <input type="text" id="search" placeholder="Search…" oninput="renderTable()">
          <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1VkUvayogDx4g-FvsnbVBIzgyDdTd4brMsillK-SL7Qc/edit" target="_blank">Edit in Google Sheets ↗</a>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('Name')">Name <span class="sort-icon" id="sort-Name">↕</span></th>
              <th onclick="sortBy('Company')">Company <span class="sort-icon" id="sort-Company">↕</span></th>
              <th onclick="sortBy('Industry')">Industry <span class="sort-icon" id="sort-Industry">↕</span></th>
              <th>Size</th>
              <th>What they're working on</th>
              <th onclick="sortBy('Applied')">Applied <span class="sort-icon" id="sort-Applied">↕</span></th>
              <th onclick="sortBy('Pipeline Stage')">Stage <span class="sort-icon" id="sort-Pipeline Stage">↕</span></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="error" style="display:none" class="error-state"></div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbytvG5lb5_3gFn7EPPKsxE9bDJWsZOO0MNcumy4qc76kYf4jR1levNoa3tbrRXsmDVE4Q/exec';
const STAGES = ['New','Reviewed','Invited','Call Booked','Call Done','Joined Slack','Rejected'];
const COLORS = ['#3b82f6','#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#14b8a6','#f97316'];

let allApplicants = [];
let sortCol = 'Applied';
let sortAsc = false;
let charts = {};

function badgeClass(stage) {
  const map = {
    'New': 'new', 'Reviewed': 'reviewed', 'Invited': 'invited',
    'Call Booked': 'call_booked', 'Call Done': 'call_done',
    'Joined Slack': 'joined_slack', 'Rejected': 'rejected'
  };
  return 'badge badge-' + (map[stage] || 'new');
}

function sizeBucket(s) {
  const n = parseInt((s || '').replace(/\D/g, ''), 10);
  if (isNaN(n)) return 'Unknown';
  if (n <= 50) return '1–50';
  if (n <= 250) return '51–250';
  if (n <= 1000) return '251–1,000';
  if (n <= 5000) return '1,001–5,000';
  return '5,000+';
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStats() {
  const counts = {};
  STAGES.forEach(s => counts[s] = 0);
  allApplicants.forEach(a => { const s = a['Pipeline Stage'] || 'New'; counts[s] = (counts[s] || 0) + 1; });
  const el = document.getElementById('stats');
  el.innerHTML = `<div class="stat"><div class="stat-num">${allApplicants.length}</div><div class="stat-label">Total</div></div>` +
    STAGES.map(s => `<div class="stat"><div class="stat-num">${counts[s]}</div><div class="stat-label">${s}</div></div>`).join('');
}

function renderCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // Pipeline funnel
  const stageCounts = STAGES.map(s => allApplicants.filter(a => (a['Pipeline Stage'] || 'New') === s).length);
  charts.pipeline = new Chart(document.getElementById('pipelineChart'), {
    type: 'bar',
    data: { labels: STAGES, datasets: [{ data: stageCounts, backgroundColor: COLORS, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: '#f1f5f9' }, ticks: { stepSize: 1, font: { size: 10 } } } } }
  });

  // Industry
  const indCounts = {};
  allApplicants.forEach(a => { const k = a['Industry'] || 'Unknown'; indCounts[k] = (indCounts[k] || 0) + 1; });
  const indLabels = Object.keys(indCounts).sort((a,b) => indCounts[b] - indCounts[a]);
  charts.industry = new Chart(document.getElementById('industryChart'), {
    type: 'bar',
    data: { labels: indLabels, datasets: [{ data: indLabels.map(l => indCounts[l]), backgroundColor: COLORS, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: '#f1f5f9' }, ticks: { stepSize: 1, font: { size: 10 } } } } }
  });

  // Size
  const ORDER = ['1–50','51–250','251–1,000','1,001–5,000','5,000+','Unknown'];
  const sizeCounts = {};
  allApplicants.forEach(a => { const k = sizeBucket(a['Company Size']); sizeCounts[k] = (sizeCounts[k] || 0) + 1; });
  const sizeLabels = ORDER.filter(l => sizeCounts[l]);
  charts.size = new Chart(document.getElementById('sizeChart'), {
    type: 'doughnut',
    data: { labels: sizeLabels, datasets: [{ data: sizeLabels.map(l => sizeCounts[l]), backgroundColor: COLORS, borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } } } }
  });
}

function renderTable() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let rows = allApplicants.filter(a =>
    !q || ['Name','Job Title','Company','Industry','Message'].some(k => (a[k] || '').toLowerCase().includes(q))
  );

  rows.sort((a, b) => {
    const va = (a[sortCol] || '').toString();
    const vb = (b[sortCol] || '').toString();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  document.querySelectorAll('th .sort-icon').forEach(el => el.textContent = '↕');
  document.querySelectorAll('th').forEach(el => el.classList.remove('sorted'));
  const icon = document.getElementById('sort-' + sortCol);
  if (icon) { icon.textContent = sortAsc ? '↑' : '↓'; icon.closest('th').classList.add('sorted'); }

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No applicants found.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(a => `
    <tr>
      <td>
        <div class="name-cell">${esc(a['Name'])}</div>
        <div class="sub">${esc(a['Job Title'] || '')}${a['Job Title'] && a['Email'] ? ' · ' : ''}${esc(a['Email'] || '')}</div>
      </td>
      <td>${esc(a['Company'] || '—')}</td>
      <td>${esc(a['Industry'] || '—')}</td>
      <td style="white-space:nowrap">${esc(a['Company Size'] || '—')}</td>
      <td><div class="msg" title="${esc(a['Message'])}">${esc(a['Message'] || '—')}</div></td>
      <td style="white-space:nowrap">${fmtDate(a['Applied'])}</td>
      <td><span class="${badgeClass(a['Pipeline Stage'] || 'New')}">${esc(a['Pipeline Stage'] || 'New')}</span></td>
    </tr>
  `).join('');
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  renderTable();
}

async function init() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('meta').textContent = 'Loading…';

  try {
    const res = await fetch(SCRIPT_URL, { redirect: 'follow' });
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || 'Script error');

    allApplicants = (json.data || []).sort((a, b) =>
      new Date(b['Applied']) - new Date(a['Applied'])
    );

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('meta').textContent =
      `${allApplicants.length} application${allApplicants.length !== 1 ? 's' : ''} · ${new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}`;

    renderStats();
    renderCharts();
    renderTable();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = 'Could not load data: ' + err.message;
  }
}

init();
</script>
</body>
</html>
